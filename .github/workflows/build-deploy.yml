name: Build and Deploy CV

on:
  push:
    branches: [main, master]
    paths-ignore: [Dockerfile, texlive.profile, .dockerignore]
  workflow_run:
    workflows: ["Build Docker Image"]
    types: [completed]
    branches: [main, master]
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    container:
      image: ghcr.io/cosmdandy/cv-texlive:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CV_LANG_EN: ${{ vars.CV_LANG_EN || 'true' }}
      CV_LANG_RU: ${{ vars.CV_LANG_RU || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine enabled languages
        id: langs
        run: |
          LANGS=""
          if [ "$CV_LANG_EN" = "true" ]; then LANGS="en"; fi
          if [ "$CV_LANG_RU" = "true" ]; then LANGS="${LANGS:+$LANGS,}ru"; fi
          if [ -z "$LANGS" ]; then echo "::error::At least one language must be enabled"; exit 1; fi
          echo "list=$LANGS" >> "$GITHUB_OUTPUT"
          echo "Enabled languages: $LANGS"

      - name: Inject CV data
        run: |
          if [ -z "${{ secrets.CV_DATA }}" ]; then
            echo "::warning::CV_DATA secret is empty, using example data"
            cp cv-data.example.yaml cv-data.yaml
          else
            echo "${{ secrets.CV_DATA }}" | base64 -d > cv-data.yaml
          fi

      - name: Validate CV data
        run: python3 -c "import yaml; d=yaml.safe_load(open('cv-data.yaml')); assert d, 'cv-data.yaml is empty'; print('OK:', len(d), 'top-level keys')"

      - name: Generate LaTeX
        run: |
          python3 scripts/build.py --data cv-data.yaml --lang ${{ steps.langs.outputs.list }} --output output/
          python3 scripts/build.py --data cv-data.yaml --lang ${{ steps.langs.outputs.list }} --output output/ --template ats

      - name: Compile LaTeX to PDF
        run: |
          cd output/
          for lang in $(echo "${{ steps.langs.outputs.list }}" | tr ',' ' '); do
            latexmk -xelatex -interaction=nonstopmode "CV-Timofey-Kondrashin-${lang}.tex"
            latexmk -xelatex -interaction=nonstopmode "CV-Timofey-Kondrashin-ats-${lang}.tex"
          done

      - name: Convert PDF to WebP
        run: |
          cd output/
          for lang in $(echo "${{ steps.langs.outputs.list }}" | tr ',' ' '); do
            pdftoppm -r 300 -png "CV-Timofey-Kondrashin-${lang}.pdf" "page-${lang}"
            for f in page-${lang}-*.png; do
              page_num=$(echo "$f" | grep -o '[0-9]*\.png' | grep -o '[0-9]*')
              cwebp -q 92 "$f" -o "cv-${lang}-${page_num}.webp"
              cwebp -q 88 -resize 1240 0 "$f" -o "cv-${lang}-${page_num}-sm.webp"
              rm "$f"
            done
          done

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: output/CV-Timofey-Kondrashin-*.pdf
          retention-days: 7

      - name: Prepare Pages content
        run: |
          mkdir -p _site/fonts
          for lang in $(echo "${{ steps.langs.outputs.list }}" | tr ',' ' '); do
            cp "output/CV-Timofey-Kondrashin-${lang}.pdf" _site/
          done
          cp output/cv-*.webp _site/
          python3 scripts/build_pages.py --langs ${{ steps.langs.outputs.list }} --input pages/index.html --output _site/index.html
          cp pages/fonts/*.woff2 _site/fonts/
          cp CNAME _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
