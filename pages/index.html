<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV | Timofey Kondrashin</title>
    <meta name="description"
        content="CV of Timofey Kondrashin — DevOps Engineer. Experience with Kubernetes, Terraform, CI/CD, and cloud infrastructure.">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <link rel="preload" href="fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="cv-en-1.webp" as="image" type="image/webp">
    <link rel="prefetch" href="cv-ru-1.webp" as="image" type="image/webp">
    <style>
        @font-face {
            font-family: 'Inter';
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            src: url('fonts/Inter-Regular.woff2') format('woff2');
        }

        @font-face {
            font-family: 'Inter';
            font-weight: 600;
            font-style: normal;
            font-display: swap;
            src: url('fonts/Inter-SemiBold.woff2') format('woff2');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fdfdfd;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Dot pattern background */
        .dot-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.25) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 1;
        }

        .page {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2.5rem 1rem 2rem;
            width: 100%;
            max-width: 1000px;
        }

        .header-left {
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .header-left:hover {
            opacity: 0.7;
        }

        .header-left h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.15rem;
            color: #fdfdfd;
        }

        .header-left .subtitle {
            font-size: 0.9rem;
            color: #70757e;
            font-weight: 400;
        }

        .links {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #fdfdfd;
        }

        .links a svg {
            width: 16px;
            height: 16px;
        }

        /* Controls bar */
        .controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 6px;
            margin: 0 1rem 1.5rem;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 14px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 10px;
            background: transparent;
            color: #70757e;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn:hover {
            color: #fdfdfd;
            background: rgba(255, 255, 255, 0.04);
        }

        .btn.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.08);
            color: #fdfdfd;
        }

        .controls-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.08);
            margin: 0 4px;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #70757e;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .zoom-btn:hover:not(:disabled) {
            color: #fdfdfd;
            background: rgba(255, 255, 255, 0.06);
        }

        .zoom-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .zoom-label {
            font-size: 0.75rem;
            color: #70757e;
            min-width: 36px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .btn-download {
            padding: 8px 18px;
            border-radius: 10px;
            background: #fdfdfd;
            color: #000;
            border: none;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-download:hover {
            opacity: 0.85;
        }

        /* PDF Viewer */
        .viewer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 1rem 3rem;
        }

        #pdf-container {
            position: relative;
            max-width: 1000px;
            width: 100%;
            transition: max-width 0.3s ease;
        }

        /* Glow effect — sits behind PDF, follows container size */
        .glow {
            position: absolute;
            inset: -120px;
            border-radius: 60px;
            background: linear-gradient(45deg,
                    rgba(255, 50, 100, 0.45) 0%,
                    rgba(255, 80, 150, 0.30) 25%,
                    rgba(120, 40, 220, 0.15) 50%,
                    rgba(0, 220, 255, 0.30) 75%,
                    rgba(0, 255, 255, 0.45) 100%);
            filter: blur(160px);
            pointer-events: none;
            z-index: 0;
        }

        #pdf-container img {
            position: relative;
            z-index: 1;
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-top: 1px solid rgba(255, 255, 255, 0.20);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04),
                0 0 80px -20px rgba(255, 255, 255, 0.06);
            margin-bottom: 16px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #3a3a3a;
            font-size: 0.8rem;
        }

        .footer a {
            color: #3a3a3a;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #70757e;
        }

        /* Loading — reserve space matching A4 aspect ratio */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 210 / 297;
            width: 100%;
            color: #70757e;
            font-size: 0.9rem;
        }

        /* Cursor follower — subtle white spotlight */
        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at center,
                    rgba(255, 255, 255, 0.04) 0%,
                    rgba(255, 255, 255, 0.015) 35%,
                    transparent 60%);
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: opacity 0.4s;
            opacity: 0;
        }

        .cursor-glow.visible {
            opacity: 1;
        }

        /* Mobile */
        @media (max-width: 640px) {

            html,
            body {
                overflow-x: hidden;
                max-width: 100vw;
            }

            .header {
                padding: 1.5rem 1rem 1rem;
            }

            .header-left h1 {
                font-size: 1.1rem;
            }

            .header-left .subtitle {
                font-size: 0.8rem;
            }

            .links {
                gap: 0.75rem;
            }

            .links a span {
                display: none;
            }

            .links a svg {
                width: 22px;
                height: 22px;
            }

            .links a {
                gap: 0;
            }

            .controls {
                flex-wrap: wrap;
                justify-content: center;
            }

            .zoom-controls {
                display: none;
            }

            .controls-divider {
                display: none;
            }

            .viewer {
                padding: 0 1.25rem 0.5rem;
            }

            .footer {
                padding: 0.75rem 1rem;
            }

            #pdf-container {
                max-width: 100% !important;
            }

            #pdf-container img {
                border-radius: 10px;
                margin-bottom: 10px;
            }

            .glow {
                inset: -40px;
                filter: blur(60px);
            }

            .cursor-glow {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="dot-bg"></div>

    <div class="page">
        <div class="header">
            <a href="https://cosmdandy.dev" class="header-left">
                <h1>Timofey Kondrashin</h1>
                <div class="subtitle">DevOps Engineer</div>
            </a>
            <div class="links">
                <a href="https://github.com/CosmDandy" target="_blank" aria-label="GitHub">

                    </svg>
                    <span>LinkedIn</span>
                </a>
            </div>
        </div>

        <div class="controls">
            <button class="btn active" onclick="window.switchPdf('en', this)">English</button>
            <button class="btn" onclick="window.switchPdf('ru', this)">Русский</button>
            <div class="controls-divider"></div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="window.zoomOut()" id="zoom-out">−</button>
                <span class="zoom-label" id="zoom-label">100%</span>
                <button class="zoom-btn" onclick="window.zoomIn()" id="zoom-in">+</button>
            </div>
            <div class="controls-divider"></div>
            <a class="btn-download" id="download-btn" href="CV-Timofey-Kondrashin-en.pdf" download>Download PDF</a>
        </div>

        <main class="viewer">
            <div id="pdf-container">
                <div class="glow"></div>
                <div id="pdf-pages-en">
                    <img src="cv-en-1.webp" alt="CV Timofey Kondrashin — Page 1" width="2480" height="3508">
                </div>
                <div id="pdf-pages-ru" style="display:none">
                    <img src="cv-ru-1.webp" alt="CV Тимофей Кондрашин — Страница 1" width="2480" height="3508">
                </div>
            </div>
        </main>

        <div class="footer">
            Built with LaTeX, Jinja2 & GitHub Actions —
            <a href="https://github.com/CosmDandy/cv">source</a>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let currentZoom = 100;
        const ZOOM_STEP = 25;
        const ZOOM_MIN = 50;
        const ZOOM_MAX = 200;

        function updateZoomDisplay() {
            const container = document.getElementById('pdf-container');
            container.style.maxWidth = `${1000 * (currentZoom / 100)}px`;
            document.getElementById('zoom-label').textContent = `${currentZoom}%`;
            document.getElementById('zoom-in').disabled = currentZoom >= ZOOM_MAX;
            document.getElementById('zoom-out').disabled = currentZoom <= ZOOM_MIN;
        }

        window.switchPdf = function (lang, el) {
            currentLang = lang;
            document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('download-btn').href = `CV-Timofey-Kondrashin-${lang}.pdf`;
            ['en', 'ru'].forEach(l => {
                document.getElementById(`pdf-pages-${l}`).style.display = l === lang ? '' : 'none';
            });
        };

        window.zoomIn = function () {
            if (currentZoom < ZOOM_MAX) { currentZoom += ZOOM_STEP; updateZoomDisplay(); }
        };
        window.zoomOut = function () {
            if (currentZoom > ZOOM_MIN) { currentZoom -= ZOOM_STEP; updateZoomDisplay(); }
        };

        // Cursor glow follower
        const cursorGlow = document.getElementById('cursor-glow');
        const downloadBtn = document.querySelector('.btn-download');
        let mouseX = 0, mouseY = 0, glowX = 0, glowY = 0, hideGlow = false;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            if (!hideGlow) cursorGlow.classList.add('visible');
        });
        document.addEventListener('mouseleave', () => cursorGlow.classList.remove('visible'));
        downloadBtn.addEventListener('mouseenter', () => { hideGlow = true; cursorGlow.classList.remove('visible'); });
        downloadBtn.addEventListener('mouseleave', () => { hideGlow = false; cursorGlow.classList.add('visible'); });

        function animateCursor() {
            glowX += (mouseX - glowX) * 0.15;
            glowY += (mouseY - glowY) * 0.15;
            cursorGlow.style.left = glowX + 'px';
            cursorGlow.style.top = glowY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
    </script>
</body>
