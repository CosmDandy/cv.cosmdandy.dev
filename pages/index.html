    <style>
        @font-face {
            font-family: 'Inter';
            font-weight: 400;
            font-display: block;
            src: url('fonts/Inter-Regular.woff2') format('woff2');
        }

        @font-face {
            font-family: 'Inter';
            font-weight: 600;
            font-display: block;
            src: url('fonts/Inter-SemiBold.woff2') format('woff2');
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translate3d(0, 8px, 0); }
            to   { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: translate3d(0, 6px, 0) scale(0.96); }
            to   { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
        }

        @keyframes badgeShimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        :root {
            --fg: #ededed;
            --fg-muted: #839496;
            --fg-dim: #586e75;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-variant-numeric: tabular-nums;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #000;
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::selection {
            background: rgba(120, 40, 220, 0.4);
            color: var(--fg);
        }

        :focus-visible {
            outline: 2px solid rgba(0, 220, 255, 0.5);
            outline-offset: 2px;
        }

        /* Dot pattern background */
        .dot-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(147, 161, 161, 0.25) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 1;
        }

        .page {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 16px 32px;
            width: 100%;
            max-width: 1000px;
        }

        .header-left {
            text-decoration: none;
            transform: translateZ(0);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: opacity 0.40s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: fadeUp 0.6s cubic-bezier(0.32, 0.72, 0, 1) 0ms backwards;
        }

        .header-left:hover {
            opacity: 0.7;
        }

        .header-left h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 4px;
            color: var(--fg);
        }

        .header-left .subtitle {
            font-size: 0.9rem;
            color: var(--fg-dim);
            font-weight: 400;
        }

        .links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--fg-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            transition: color 0.40s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .links a:hover {
            color: var(--fg);
        }

        .links a {
            transform: translateZ(0);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .links a:nth-child(1) { animation: fadeUp 0.6s cubic-bezier(0.32, 0.72, 0, 1) 60ms backwards; }
        .links a:nth-child(2) { animation: fadeUp 0.6s cubic-bezier(0.32, 0.72, 0, 1) 120ms backwards; }
        .links a:nth-child(3) { animation: fadeUp 0.6s cubic-bezier(0.32, 0.72, 0, 1) 180ms backwards; }

        .links a svg {
            width: 16px;
            height: 16px;
        }

        /* Controls bar */
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            margin: 0 16px 24px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 14px;
            backdrop-filter: blur(25px);
            animation: fadeUp 0.6s cubic-bezier(0.32, 0.72, 0, 1) 240ms backwards;
        }

        .controls .btn,
        .controls .zoom-btn {
            transform: translateZ(0);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            animation: popIn 0.6s cubic-bezier(0.32, 0.72, 0, 1) 300ms backwards;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 10px;
            background: transparent;
            color: var(--fg-dim);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition:
                color 0.44s cubic-bezier(0.34, 1.56, 0.64, 1),
                background-color 0.44s cubic-bezier(0.34, 1.56, 0.64, 1),
                border-color 0.44s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.44s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }

        .btn:hover {
            color: var(--fg);
            background: rgba(255, 255, 255, 0.04);
            transform: translate3d(0, -1px, 0);
        }

        .btn.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.08);
            color: var(--fg);
        }

        .controls-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.08);
            margin: 0 4px;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--fg-dim);
            font-size: 1.1rem;
            cursor: pointer;
            transition:
                color 0.40s cubic-bezier(0.34, 1.56, 0.64, 1),
                background-color 0.40s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.40s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .zoom-btn:hover:not(:disabled) {
            color: var(--fg);
            background: rgba(255, 255, 255, 0.06);
            transform: translate3d(0, -1px, 0);
        }

        .zoom-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .zoom-label {
            font-size: 0.75rem;
            color: var(--fg-dim);
            min-width: 36px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .btn-download {
            position: relative;
            padding: 8px 16px;
            border-radius: 10px;
            background: var(--fg);
            color: #000;
            border: none;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            isolation: isolate;
            transform: translateZ(0);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            animation: popIn 0.6s cubic-bezier(0.32, 0.72, 0, 1) 360ms backwards;
            transition:
                transform 0.44s cubic-bezier(0.34, 1.56, 0.64, 1),
                filter 0.44s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn-download::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg,
                    rgba(255, 50, 100, 0)    0%,
                    rgba(255, 50, 100, 0.35) 20%,
                    rgba(120, 40, 220, 0.35) 50%,
                    rgba(0, 220, 255, 0.35)  80%,
                    rgba(0, 220, 255, 0)     100%);
            background-size: 200% 100%;
            background-position: 200% 0;
            mix-blend-mode: multiply;
            animation: badgeShimmer 4.5s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        .btn-download:hover {
            transform: translate3d(0, -1px, 0) scale(1.02);
            filter: brightness(1.05);
        }

        /* PDF Viewer */
        .viewer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px 48px;
        }

        #pdf-container {
            position: relative;
            max-width: 1000px;
            width: 100%;
            transition: max-width 0.18s linear;
            animation: fadeUp 0.6s cubic-bezier(0.32, 0.72, 0, 1) 420ms backwards;
        }

        /* Glow effect — sits behind PDF, follows container size */
        .glow {
            position: absolute;
            inset: -120px;
            border-radius: 60px;
            background: linear-gradient(45deg,
                    rgba(255, 50, 100, 0.45) 0%,
                    rgba(255, 80, 150, 0.30) 25%,
                    rgba(120, 40, 220, 0.15) 50%,
                    rgba(0, 220, 255, 0.30) 75%,
                    rgba(0, 255, 255, 0.45) 100%);
            filter: blur(160px);
            pointer-events: none;
            z-index: 0;
            animation: none;
        }

        #pdf-container img {
            position: relative;
            z-index: 1;
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-top: 1px solid rgba(255, 255, 255, 0.20);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04),
                0 0 80px -20px rgba(255, 255, 255, 0.06);
            margin-bottom: 16px;
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 32px 16px;
            color: var(--fg-dim);
            font-size: 0.8rem;
            transform: translateZ(0);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            animation: fadeUp 0.65s cubic-bezier(0.32, 0.72, 0, 1) 720ms backwards;
        }

        .footer a {
            color: var(--fg-dim);
            text-decoration: none;
            transition: color 0.44s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .footer a:hover {
            color: var(--fg-muted);
        }

        /* Loading — reserve space matching A4 aspect ratio */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 210 / 297;
            width: 100%;
            color: var(--fg-dim);
            font-size: 0.9rem;
        }

        /* Cursor follower — subtle white spotlight */
        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at center,
                    rgba(237, 237, 237, 0.035) 0%,
                    rgba(237, 237, 237, 0.013) 35%,
                    transparent 60%);
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: opacity 0.40s cubic-bezier(0.32, 0.72, 0, 1);
            opacity: 0;
            will-change: transform, opacity;
        }

        .cursor-glow.visible {
            opacity: 1;
        }

        /* Mobile */
        @media (max-width: 640px) {

            html,
            body {
                overflow-x: hidden;
                max-width: 100vw;
            }

            .header {
                padding: 24px 16px 16px;
            }

            .header-left h1 {
                font-size: 1.1rem;
            }

            .header-left .subtitle {
                font-size: 0.8rem;
            }

            .links {
                gap: 12px;
            }

            .links a span {
                display: none;
            }

            .links a svg {
                width: 22px;
                height: 22px;
            }

            .links a {
                gap: 0;
            }

            .controls {
                flex-wrap: wrap;
                justify-content: center;
            }

            .zoom-controls {
                display: none;
            }

            .controls-divider {
                display: none;
            }

            .viewer {
                padding: 0 16px 8px;
            }

            .footer {
                padding: 12px 16px;
            }

            #pdf-container {
                max-width: 100% !important;
            }

            #pdf-container img {
                border-radius: 10px;
                margin-bottom: 8px;
            }

            .glow {
                inset: -40px;
                filter: blur(60px);
            }

            .cursor-glow {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
            .btn-download::before { display: none; }
            .cursor-glow         { display: none; }
        }
    </style>
</head>

    <script>
        let currentLang = 'en';
        let currentZoom = 100;
        const ZOOM_STEP = 25;
        const ZOOM_MIN = 50;
        const ZOOM_MAX = 200;

        function updateZoomDisplay() {
            const container = document.getElementById('pdf-container');
            container.style.maxWidth = `${1000 * (currentZoom / 100)}px`;
            document.getElementById('zoom-label').textContent = `${currentZoom}%`;
            document.getElementById('zoom-in').disabled = currentZoom >= ZOOM_MAX;
            document.getElementById('zoom-out').disabled = currentZoom <= ZOOM_MIN;
        }

        // LANG:multi:start
        window.switchPdf = function (lang, el) {
            currentLang = lang;
            document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('download-btn').href = `CV-Timofey-Kondrashin-${lang}.pdf`;
            ['en', 'ru'].forEach(l => {
                document.getElementById(`pdf-pages-${l}`).style.display = l === lang ? '' : 'none';
            });
        };
        // LANG:multi:end

        window.zoomIn = function () {
            if (currentZoom < ZOOM_MAX) { currentZoom += ZOOM_STEP; updateZoomDisplay(); }
        };
        window.zoomOut = function () {
            if (currentZoom > ZOOM_MIN) { currentZoom -= ZOOM_STEP; updateZoomDisplay(); }
        };

        // Cursor glow follower
        const cursorGlow = document.getElementById('cursor-glow');
        const downloadBtn = document.querySelector('.btn-download');
        let mouseX = 0, mouseY = 0, glowX = 0, glowY = 0, hideGlow = false;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            if (!hideGlow) cursorGlow.classList.add('visible');
        });
        document.addEventListener('mouseleave', () => cursorGlow.classList.remove('visible'));
        downloadBtn.addEventListener('mouseenter', () => { hideGlow = true; cursorGlow.classList.remove('visible'); });
        downloadBtn.addEventListener('mouseleave', () => { hideGlow = false; cursorGlow.classList.add('visible'); });

        function animateCursor() {
            glowX += (mouseX - glowX) * 0.15;
            glowY += (mouseY - glowY) * 0.15;
            cursorGlow.style.left = glowX + 'px';
            cursorGlow.style.top = glowY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
    </script>
</body>

</html>
